<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="beamhop">
  <defs>
    <linearGradient id="beam" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="60%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Two anchor nodes -->
  <circle cx="12" cy="48" r="6" fill="url(#beam)"/>
  <circle cx="52" cy="16" r="6" fill="url(#beam)"/>

  <!-- The beam, arcing between them -->
  <path d="M 12 48 Q 20 12, 52 16"
        fill="none"
        stroke="url(#beam)"
        stroke-width="3.5"
        stroke-linecap="round"
        filter="url(#glow)"/>

  <!-- A small midpoint marker — the "hop" -->
  <circle cx="30" cy="22" r="2.5" fill="#fafafa" opacity="0.95"/>
</svg>
